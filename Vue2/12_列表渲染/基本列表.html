<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script src="../js/vue.js"></script>
</head>

<body>
  <div id="root">
    <h2>人员列表</h2>
    <ul>
      <!-- 遍历数组 -->
      <li v-for="p in persons" :key="p.id">姓名：{{p.name}}，年龄：{{p.age}}</li>
      <!-- <li v-for="(p,index) in persons" :key="index">姓名：{{p.name}}，年龄：{{p.age}}</li> -->
    </ul>
    <ul>
      <!-- 遍历对象 -->
      <li v-for="(value,k) in car" :key="k">{{k}}-{{value}}</li>
    </ul>
    <ul>
      <!-- 遍历字符串 -->
      <li v-for="(char,index) in str" :key="index">{{index}}-{{char}}</li>
    </ul>
    <ul>
      <!-- 遍历指定次数 -->
      <li v-for="(number,index) in 5" :key="index">{{index}}-{{number}}</li>
    </ul>
  </div>

  <script type="text/javascript">
    Vue.config.productionTip = false
    new Vue({
      el: '#root',
      data: {
        persons: [
          { id: '001', name: '张三', age: 18 },
          { id: '002', name: '李四', age: 19 },
          { id: '003', name: '王五', age: 20 }
        ],
        car: {
          name: '奥迪',
          price: '20w',
          color: '黑色'
        },
        str: 'Hello'
      }
    })
  </script>
</body>

</html>
