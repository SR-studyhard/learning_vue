<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script src="../js/vue.js"></script>
</head>

<body>
  <div id="root">
    <h2>当前n的值为：{{n}}</h2>
    <button @click="n++">点我n加一</button>
    <!-- 使用v-show做条件渲染 -->
    <!-- <div v-show="false">{{name}}</div> -->
    <!-- <div v-show="1 === 1">{{name}}</div> -->
    <!-- 使用v-if做条件渲染 -->
    <!-- <div v-if="false">{{name}}</div>
    <div v-if="1 === 1">{{name}}</div> -->

    <div v-if="n === 1">Angular</div>
    <div v-else-if="n === 2">React</div>
    <div v-else-if="n === 3">Vue</div>
    <div v-else>哈哈</div>
    <!-- v-if与template的配合使用 -->
    <template v-if="n===1">
      <h2>你好</h2>
      <h2>{{name}}</h2>
      <h2>北京</h2>
    </template>
  </div>

  <script type="text/javascript">
    Vue.config.productionTip = false
    new Vue({
      el: '#root',
      data: {
        name: '尚硅谷',
        n: 0,
      }
    })
  </script>
</body>

</html>
