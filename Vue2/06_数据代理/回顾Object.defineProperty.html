<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <!-- 引入Vue -->
  <script type="text/javascript" src="../js/vue.js"></script>
</head>

<body>
  <script type="text/javascript">
    let number = 18
    let person = {
      name: '张三',
      sex: '男',
    }
    Object.defineProperty(person, 'age', {
      // value: 18,
      // enumerable: true,//控制属性是否可以枚举，默认值false
      // writable: true,//控制属性是否可以修改，默认值false
      // configurable: true,//控制属性是否可以被删除，默认值false
      //当有人读取person的age时返回Number给age
      get() {
        return number
      },
      //当有人修改person的age时返回修改值给age
      set(value) {
        number = value
      }
    })
    console.log(person);
    console.log(Object.keys(person));//输出传入对象的每个元素名形成一个数组
  </script>
</body>

</html>
