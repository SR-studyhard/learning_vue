<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script src="../js/vue.js"></script>
</head>

<body>
  <div id="root">
    <school></school>
    <hr>
    <student></student>
  </div>

  <script type="text/javascript">
    Vue.config.productionTip = false
    //创建school组件
    const school = Vue.extend({
      template: `
        <div>
          <h2>学校名称：{{name}}</h2>
          <h2>学校地址：{{address}}</h2>
        </div>
      `,
      data() {
        return {
          name: '尚硅谷',
          address: 'beijing',
        }
      }
    })
    //创建student组件
    const student = Vue.extend({
      template: `
        <div>
          <h2>学生姓名：{{name}}</h2>
          <h2>学生年龄：{{age}}</h2>
        </div>
      `,
      data() {
        return {
          name: '张三',
          age: 18
        }
      }
    })
    //注册全局组件
    Vue.component('school', school)
    new Vue({
      el: '#root',
      //注册组件(局部)
      components: {
        school,
        student
      }
    })
  </script>
</body>

</html>
